name: Create meeting log PR from Notion

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create issue, branch, commit, and PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_MEETING_DATABASE_ID: ${{ secrets.NOTION_MEETING_DATABASE_ID }}
          NOTION_MEETING_TITLE_PROPERTY: 회의 주제
          NOTION_MEETING_DATE_PROPERTY: 날짜
          NOTION_MEETING_SUMMARY_PROPERTY: 회의 요약
          NOTION_MEETING_STATUS_PROPERTY: 상태
          NOTION_MEETING_STATUS: 정리 완료
          NOTION_MEETING_NEXT_STATUS: PR 생성
          NOTION_MEETING_REFINED_SECTION: 정리본
          NOTION_MEETING_ISSUE_PROPERTY: GitHub Issue
          NOTION_MEETING_PR_PROPERTY: GitHub PR
        run: python scripts/sync_notion_meeting_pr.py
