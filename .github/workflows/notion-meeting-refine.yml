name: Refine Notion meeting logs

on:
  workflow_dispatch:

jobs:
  refine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refine meeting logs in Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          NOTION_MEETING_DATABASE_ID: ${{ secrets.NOTION_MEETING_DATABASE_ID }}
          NOTION_MEETING_TITLE_PROPERTY: 회의 주제
          NOTION_MEETING_DATE_PROPERTY: 날짜
          NOTION_MEETING_SUMMARY_PROPERTY: 회의 요약
          NOTION_MEETING_STATUS_PROPERTY: 상태
          NOTION_MEETING_REFINE_STATUS: 정리 필요
          NOTION_MEETING_REFINED_STATUS: 정리 완료
        run: python scripts/refine_notion_meeting.py --overwrite
